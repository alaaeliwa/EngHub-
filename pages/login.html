<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" href="../images/favicon.ico" />
    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- style -->
     
     <link rel="stylesheet" href="../style/global.css">
    <link rel="stylesheet" href="../style/login.css" />

    <title>Login | EngHub</title>
  </head>
  <body>
    <!-- Premium Preloader -->
    <div id="preloader" class="preloader">
      <div class="preloader-content">
        <div class="logo-glow"></div>
        <img src="../images/logo.png" alt="EngHub Logo" class="preloader-logo" />
        <div class="spinner-container">
          <div class="spinner"></div>
        </div>
        <p class="preloader-text">Preparing your hub...</p>
      </div>
    </div>

    <main class="login-page">
      <div class="login-container">
        <!-- Left Side: Media & Welcome -->
        <div class="login-media">
          <div class="media-content">
            <a href="../index.html" class="login-logo">
              <img src="../images/logo.png" alt="EngHub logo" />
            </a>
            <div class="welcome-text">
              <h1>Welcome Back!</h1>
              <p>Continue your engineering journey with access to all your resources and community insights.</p>
            </div>
          </div>
          <!-- Decorative shapes -->
          <div class="media-shape-1"></div>
          <div class="media-shape-2"></div>
        </div>

        <!-- Right Side: Form -->
        <div class="login-form-area">
          <div class="form-wrapper">
            <div class="form-header">
              <h2>Sign In</h2>
              <p>Enter your details to access your account</p>
            </div>

            <form class="login-form">
              <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-envelope"></i>
                  <input type="email" id="email" placeholder="name@example.com" required />
                </div>
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-lock"></i>
                  <input type="password" id="password" placeholder="••••••••" required />
                </div>
              </div>

              <div class="form-options">
                <label class="remember-me">
                  <input type="checkbox" />
                  <span>Remember me</span>
                </label>
                <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
              </div>

              <button type="submit" class="btn btn-primary btn-block">Sign In</button>

              <div class="form-divider">
                <span>Or continue with</span>
              </div>

              <div class="social-login">
                <button type="button" class="btn btn-outline social-btn">
                  <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
                  Google
                </button>
                <button type="button" class="btn btn-outline social-btn">
                  <img src="https://www.svgrepo.com/show/448234/linkedin.svg" alt="LinkedIn" />
                  LinkedIn
                </button>
              </div>
            </form>

            <div class="form-footer">
              <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/auth.js"></script>
  </body>
</html>
