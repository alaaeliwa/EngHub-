<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- style -->
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="style/register.css" />

    <title>Join EngHub | Create Account</title>
  </head>
  <body>
    <main class="register-page">
      <div class="register-container">
        <!-- Left Side: Media & Community -->
        <div class="register-media">
          <div class="media-content">
            <a href="index.html" class="register-logo">
              <img src="images/logo.png" alt="EngHub logo" />
            </a>
            <div class="welcome-text">
              <h1>Join Our Community</h1>
              <p>Start your journey today and connect with thousands of engineering students sharing knowledge and resources.</p>
            </div>
            <div class="illustration-container">
              <!-- Reusing the high-quality about illustration -->
              <img src="C:\Users\ALamiah\.gemini\antigravity\brain\3c65e60f-54d8-4223-985c-5f46e361da04\about_illustration_1778515717356.png" alt="EngHub Community Illustration" />
            </div>
          </div>
          <!-- Decorative shapes -->
          <div class="media-shape-1"></div>
          <div class="media-shape-2"></div>
        </div>

        <!-- Right Side: Form -->
        <div class="register-form-area">
          <div class="form-wrapper">
            <div class="form-header">
              <h2>Create Account</h2>
              <p>Join the hub of engineering excellence</p>
            </div>

            <form class="register-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="full-name">Full Name</label>
                  <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="full-name" placeholder="John Doe" required />
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-envelope"></i>
                  <input type="email" id="email" placeholder="name@example.com" required />
                </div>
              </div>

              <div class="form-row grid-2">
                <div class="form-group">
                  <label for="department">Department</label>
                  <div class="input-wrapper">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <select id="department" required>
                      <option value="" disabled selected>Select Dept</option>
                      <option value="civil">Civil Engineering</option>
                      <option value="mechanical">Mechanical Engineering</option>
                      <option value="electrical">Electrical Engineering</option>
                      <option value="software">Software Engineering</option>
                      <option value="chemical">Chemical Engineering</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="level">Academic Level</label>
                  <div class="input-wrapper">
                    <i class="fa-solid fa-layer-group"></i>
                    <select id="level" required>
                      <option value="" disabled selected>Level</option>
                      <option value="1">Year 1</option>
                      <option value="2">Year 2</option>
                      <option value="3">Year 3</option>
                      <option value="4">Year 4</option>
                      <option value="5">Year 5</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="form-row grid-2">
                <div class="form-group">
                  <label for="password">Password</label>
                  <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required />
                  </div>
                </div>
                <div class="form-group">
                  <label for="confirm-password">Confirm</label>
                  <div class="input-wrapper">
                    <i class="fa-solid fa-shield-check"></i>
                    <input type="password" id="confirm-password" placeholder="••••••••" required />
                  </div>
                </div>
              </div>

              <div class="form-options">
                <label class="terms-checkbox">
                  <input type="checkbox" required />
                  <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>
              </div>

              <button type="submit" class="btn btn-primary btn-block">Create Account</button>

              <div class="form-divider">
                <span>Or sign up with</span>
              </div>

              <div class="social-login">
                <button type="button" class="btn btn-outline social-btn">
                  <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
                  Google
                </button>
                <button type="button" class="btn btn-outline social-btn">
                  <img src="https://www.svgrepo.com/show/448234/linkedin.svg" alt="LinkedIn" />
                  LinkedIn
                </button>
              </div>
            </form>

            <div class="form-footer">
              <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
